name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy pytest pytest-cov
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 speechscribe/ src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings for now
          flake8 speechscribe/ src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
      - name: Check formatting with black
        run: |
          black --check --diff src/ speechscribe/
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff src/ speechscribe/
      - name: Type check with mypy
        run: |
          mypy src/speechscribe/ speechscribe/core/ --ignore-missing-imports
      - name: Test with pytest
        run: |
          pytest --cov=speechscribe --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
